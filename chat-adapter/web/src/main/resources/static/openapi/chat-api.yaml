openapi: 3.0.3
info:
  title: Chat Web API
  version: 1.0.0
  description: |
    chat-adapter:web 모듈의 REST API 스펙.
    세션 기반 인증(memberId in HttpSession)을 사용한다.
servers:
  - url: /
paths:
  /api/rooms:
    get:
      tags: [Room]
      summary: 방 목록 조회
      description: 활성 GROUP 방 목록을 조회한다.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoomDto'
    post:
      tags: [Room]
      summary: 방 생성
      description: 세션 사용자로 새 GROUP 방을 생성한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '200':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDto'
        '401':
          description: 세션 없음
  /api/rooms/search:
    get:
      tags: [Room]
      summary: 방 이름 검색
      parameters:
        - in: query
          name: keyword
          required: false
          schema:
            type: string
          description: null/blank이면 전체 GROUP 방
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoomDto'
  /api/rooms/{roomId}/leave:
    post:
      tags: [Room]
      summary: 방 퇴장
      parameters:
        - in: path
          name: roomId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 퇴장 성공
        '401':
          description: 세션 없음
  /api/rooms/{roomId}/history:
    get:
      tags: [Room]
      summary: 방 메시지 이력 조회
      parameters:
        - in: path
          name: roomId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoomMessageDto'
  /api/rooms/{roomId}/participants:
    get:
      tags: [Room]
      summary: 방 참여자 조회
      parameters:
        - in: path
          name: roomId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemberInfo'
  /api/direct/{targetMemberId}:
    post:
      tags: [Direct]
      summary: 1:1 채팅 시작
      parameters:
        - in: path
          name: targetMemberId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 기존/신규 DIRECT 방 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDto'
        '400':
          description: 잘못된 요청(예: 자기 자신 대상)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 세션 없음
  /api/direct/rooms:
    get:
      tags: [Direct]
      summary: 내 1:1 대화 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoomDto'
  /api/lobby/history:
    get:
      tags: [Lobby]
      summary: 로비 메시지 이력 조회
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LobbyMessageDto'
  /api/members/online:
    get:
      tags: [Member]
      summary: 온라인 사용자 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemberInfo'

components:
  schemas:
    CreateRoomRequest:
      type: object
      required: [roomName]
      properties:
        roomName:
          type: string
          example: 자바 스터디
    RoomDto:
      type: object
      properties:
        roomId:
          type: string
        roomName:
          type: string
        creatorId:
          type: string
        participantCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        roomType:
          type: string
          description: GROUP | DIRECT
          enum: [GROUP, DIRECT]
    RoomMessageDto:
      type: object
      properties:
        roomId:
          type: string
        senderId:
          type: string
          nullable: true
        senderNickname:
          type: string
          nullable: true
        content:
          type: string
        sentAt:
          type: string
          description: HH:mm 포맷 문자열
        type:
          type: string
          enum: [TEXT, SYSTEM]
    LobbyMessageDto:
      type: object
      properties:
        senderId:
          type: string
        senderNickname:
          type: string
        content:
          type: string
        sentAt:
          type: string
          description: HH:mm 포맷 문자열
        type:
          type: string
          enum: [TEXT, SYSTEM]
    MemberInfo:
      type: object
      properties:
        memberId:
          type: string
        nickname:
          type: string
        randomNickname:
          type: boolean
    ErrorResponse:
      type: object
      properties:
        message:
          type: string

