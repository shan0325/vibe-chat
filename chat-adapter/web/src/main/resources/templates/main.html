<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- 상단 네비게이션 -->
<nav class="navbar navbar-dark main-navbar px-3">
    <span class="navbar-brand fw-bold">💬 Chat</span>
    <div class="d-flex align-items-center gap-2">
        <span class="badge bg-success" id="connection-badge">● 연결중</span>
        <span class="text-white small">
            <span class="badge bg-light text-dark" th:text="${memberInfo.nickname}">닉네임</span> 님
        </span>
        <a th:href="@{/}" class="btn btn-outline-light btn-sm">닉네임 변경</a>
    </div>
</nav>

<!-- 에러 알림 (Flash attribute) -->
<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show m-2" role="alert">
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div class="container-fluid">
    <div class="row">

        <!-- 사이드바 -->
        <div class="col-md-3 sidebar p-3">
            <h6 class="fw-bold text-muted mb-2">
                👥 접속자 <span class="badge bg-primary rounded-pill" id="online-count">0</span>
            </h6>
            <div id="online-members" class="mb-3"></div>

            <hr/>

            <!-- 1:1 대화 목록 -->
            <h6 class="fw-bold text-muted mb-2">💬 1:1 대화</h6>
            <div id="direct-room-list" class="mb-3"></div>

            <hr/>

            <!-- 채팅방 목록 -->
            <div class="d-flex align-items-center justify-content-between mb-2">
                <h6 class="fw-bold text-muted mb-0">🚪 채팅방</h6>
                <button class="btn btn-primary btn-sm" id="create-room-btn">+ 방 만들기</button>
            </div>
            <!-- 방 검색 입력창 -->
            <div class="mb-2">
                <input type="text" id="room-search-input" class="form-control form-control-sm"
                       placeholder="방 이름 검색..." maxlength="30" autocomplete="off"/>
            </div>
            <div id="room-list"></div>
        </div>

        <!-- 채팅 메인 영역 -->
        <div class="col-md-9 d-flex flex-column" style="height: calc(100vh - 56px);">

            <div class="p-3 border-bottom bg-white">
                <h6 class="fw-bold mb-0">🌐 전체 채팅</h6>
            </div>

            <!-- 메시지 목록 -->
            <div id="message-list" class="flex-grow-1 p-3 overflow-auto"></div>

            <!-- 메시지 입력창 -->
            <div class="chat-input-wrap">
                <div class="input-group">
                    <input type="text" id="message-input" class="form-control"
                           placeholder="메시지를 입력하세요..." maxlength="500" autocomplete="off"/>
                    <button id="send-btn" class="btn-send btn" type="button">전송</button>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- 방 만들기 모달 -->
<div class="modal fade" id="createRoomModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">🚪 방 만들기</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <label class="form-label fw-semibold">방 이름</label>
                <input type="text" id="room-name-input" class="form-control"
                       placeholder="방 이름 입력 (최대 30자)" maxlength="30"/>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary btn-sm" id="confirm-create-room-btn">만들기</button>
            </div>
        </div>
    </div>
</div>

<!-- Thymeleaf 인라인 JS -->
<script th:inline="javascript">
    const MY_MEMBER_ID = [[${memberInfo.memberId}]];
    const MY_NICKNAME  = [[${memberInfo.nickname}]];
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- SockJS + STOMP -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<!-- 공통 JS -->
<script th:src="@{/js/chat.js}"></script>
</body>
</html>
