<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — 입장</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- 커스텀 CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="entrance-wrapper">
    <div class="card entrance-card p-4">

        <div class="text-center mb-4">
            <div class="entrance-icon mb-2">💬</div>
            <h4 class="fw-bold">Chat 입장</h4>
            <p class="text-muted small">
                랜덤 닉네임이 생성되었습니다.<br>
                그대로 사용하거나 직접 변경하세요.
            </p>
        </div>

        <form th:action="@{/nickname}" method="post">
            <div class="mb-3">
                <label for="nickname" class="form-label fw-semibold">닉네임</label>
                <input type="text"
                       id="nickname"
                       name="nickname"
                       class="form-control form-control-lg entrance-input"
                       th:value="${memberInfo.nickname}"
                       maxlength="20"
                       required
                       placeholder="닉네임 입력 (최대 20자)"/>
                <div class="form-text d-flex justify-content-between mt-1">
                    <span th:if="${memberInfo.randomNickname}"
                          class="badge bg-secondary" style="font-size:0.75rem;">🎲 랜덤 생성됨</span>
                    <span class="ms-auto text-muted">최대 20자</span>
                </div>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg">입장하기 →</button>
            </div>
        </form>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- 공통 JS -->
<script th:src="@{/js/chat.js}"></script>
</body>
</html>
