<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'💬 ' + ${room.roomName}">방 채팅</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- 상단 네비게이션 -->
<nav class="navbar navbar-dark main-navbar px-3">
    <div class="d-flex align-items-center gap-2">
        <a th:href="@{/main}" class="btn btn-outline-light btn-sm me-2">← 메인</a>
        <span class="navbar-brand fw-bold mb-0" th:text="'🚪 ' + ${room.roomName}">방 이름</span>
        <span class="badge bg-light text-dark" id="participant-count">0명</span>
    </div>
    <div class="d-flex align-items-center gap-2">
        <span class="badge bg-success" id="connection-badge">● 연결중</span>
        <span class="text-white small">
            <span class="badge bg-light text-dark" th:text="${memberInfo.nickname}">닉네임</span> 님
        </span>
        <button id="leave-btn" class="btn btn-danger btn-sm">나가기</button>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- 참여자 목록 사이드바 -->
        <div class="col-md-3 sidebar p-3">
            <h6 class="fw-bold text-muted mb-2">
                👥 참여자 <span class="badge bg-primary rounded-pill" id="participant-badge">0</span>
            </h6>
            <div id="participant-list"></div>
        </div>

        <!-- 채팅 메인 영역 -->
        <div class="col-md-9 d-flex flex-column" style="height: calc(100vh - 56px);">

            <div class="p-3 border-bottom bg-white">
                <h6 class="fw-bold mb-0" th:text="'💬 ' + ${room.roomName}">방 채팅</h6>
            </div>

            <!-- 메시지 목록 -->
            <div id="message-list" class="flex-grow-1 p-3 overflow-auto"></div>

            <!-- 메시지 입력창 -->
            <div class="chat-input-wrap">
                <div class="input-group">
                    <input type="text" id="message-input" class="form-control"
                           placeholder="메시지를 입력하세요..." maxlength="500" autocomplete="off"/>
                    <button id="send-btn" class="btn-send btn" type="button">전송</button>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Thymeleaf 인라인 JS: 서버에서 데이터 주입 -->
<script th:inline="javascript">
    const MY_MEMBER_ID = [[${memberInfo.memberId}]];
    const MY_NICKNAME  = [[${memberInfo.nickname}]];
    const ROOM_ID      = [[${room.roomId}]];
    const ROOM_NAME    = [[${room.roomName}]];
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- SockJS + STOMP -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<!-- 방 채팅 JS -->
<script th:src="@{/js/room.js}"></script>
</body>
</html>
