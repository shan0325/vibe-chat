spring:
  application:
    name: chat

  profiles:
    default: local

  # =====================
  # JPA / Hibernate (공통)
  # =====================
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # =====================
  # H2 Console
  # =====================
  h2:
    console:
      enabled: true
      path: /h2-console

