spring:
  application:
    name: chat

  # =====================
  # H2 In-Memory Database
  # =====================
  datasource:
    url: jdbc:h2:mem:chatdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # =====================
  # JPA / Hibernate
  # =====================
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # =====================
  # H2 Console (개발 편의)
  # =====================
  h2:
    console:
      enabled: true
      path: /h2-console

